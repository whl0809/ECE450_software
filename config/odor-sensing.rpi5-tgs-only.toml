# Machine-specific ADS/TGS-only diagnostic configuration for the inspected
# Raspberry Pi 5. Use this when only the ADS114S06/TGS PCB is connected.

[i2c.primary]
# Intentionally empty: no I2C devices are enabled in this diagnostic profile.

[sensors.sht45]
enabled = false

[sensors.sgp41]
enabled = false

[sensors.nh3_mcp3421]
enabled = false

[sensors.h2s_mcp3421]
enabled = false

[sensors.bme690]
enabled = false

[ads114s06]
enabled = true

[ads114s06.spi]
device = "/dev/spidev0.0"
mode = 1
bits_per_word = 8
max_speed_hz = 1000000
reference_voltage_v = 4.096
pga_gain = 1
data_rate_code = 0x14
filter_code = 0x00
conversion_mode = "single_shot_per_channel"
verify_register_readback = true
wait_for_drdy_when_configured = true
cs_behavior = "permanently_asserted_on_board"
reset_behavior = "tied_to_iovdd_on_board"

[ads114s06.gpio]
gpiochip = "/dev/gpiochip4"
expected_label = "pinctrl-rp1"
start_line_offset = 17
start_active_low = false
drdy_line_offset = 27
drdy_active_low = true
