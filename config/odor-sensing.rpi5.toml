# Machine-specific runtime configuration for the inspected Raspberry Pi 5.
# These paths and GPIO mappings are selected for this machine only. They must
# still pass startup validation and connected-board tests before hardware is
# considered verified.

[i2c.primary]
path = "/dev/i2c-1"

[i2c.secondary]
# Board 1 and Board 2 SHT45 share the primary adapter for the initial setup.
# Leave empty unless later electrical validation requires a separate adapter.

[sensors.sht45]
enabled = true
address = "0x44"
i2c_adapter = "primary"

[sensors.sgp41]
enabled = true
address = "0x59"
i2c_adapter = "primary"

[sensors.nh3_mcp3421]
enabled = true
address = "0x69"
i2c_adapter = "primary"
resolution_bits = 16
pga_gain = 1
conversion_mode = "one_shot"

[sensors.h2s_mcp3421]
enabled = true
address = "0x6A"
i2c_adapter = "primary"
resolution_bits = 16
pga_gain = 1
conversion_mode = "one_shot"

[sensors.bme690]
enabled = true
address = "0x76"
i2c_adapter = "primary"
measurement_mode = "forced"

[ads114s06.spi]
device = "/dev/spidev0.0"
mode = 1
bits_per_word = 8
max_speed_hz = 1000000
reference_voltage_v = 2.5
pga_gain = 1
data_rate_code = 0x14
filter_code = 0x00
conversion_mode = "single_shot_per_channel"
verify_register_readback = true
cs_behavior = "permanently_asserted_on_board"
reset_behavior = "tied_to_iovdd_on_board"

[ads114s06.gpio]
gpiochip = "/dev/gpiochip4"
expected_label = "pinctrl-rp1"
start_line_offset = 17
start_active_low = false
drdy_line_offset = 27
drdy_active_low = true

[logging.raw_csv]
enabled = true
schema_version = 1
output_directory = "data"
tgs_scan_interval_ms = 1000
